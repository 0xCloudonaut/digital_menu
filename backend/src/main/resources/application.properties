spring.application.name=menu
# Spring Boot 4 canonical key is spring.mongodb.uri.
spring.mongodb.uri=${SPRING_MONGODB_URI:${SPRING_DATA_MONGODB_URI:mongodb://mongodb:27017/restaurant_db}}
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized

# Public order rate limiting
app.ratelimit.public-orders.max-requests-per-window=60
app.ratelimit.public-orders.window-seconds=60
app.ratelimit.redis-enabled=${APP_RATELIMIT_REDIS_ENABLED:false}
app.ratelimit.redis-key-prefix=${APP_RATELIMIT_REDIS_KEY_PREFIX:ratelimit:public-orders}

# S3 media storage
app.s3.enabled=${APP_S3_ENABLED:false}
app.s3.bucket=${APP_S3_BUCKET:}
app.s3.region=${APP_S3_REGION:us-east-1}
app.s3.key-prefix=${APP_S3_KEY_PREFIX:menu-media}
app.s3.public-base-url=${APP_S3_PUBLIC_BASE_URL:}
app.s3.max-file-size-bytes=${APP_S3_MAX_FILE_SIZE_BYTES:15728640}
app.s3.allowed-image-content-types=${APP_S3_ALLOWED_IMAGE_TYPES:image/jpeg,image/png,image/webp,image/gif}
app.s3.allowed-video-content-types=${APP_S3_ALLOWED_VIDEO_TYPES:video/mp4,video/webm,video/quicktime}
